name: atlas

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas-local-password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # PostgreSQL 18 stores versioned clusters below this parent directory.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms768m -Xmx768m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD:-Atlas-local-2026!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -k -u admin:${OPENSEARCH_PASSWORD:-Atlas-local-2026!} https://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ./backend
    command: ["sh", "-c", "alembic upgrade head && uvicorn atlas.api.app:create_app --factory --host 0.0.0.0 --port 8000"]
    environment: &backend-environment
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas-local-password}@postgres:5432/${POSTGRES_DB:-atlas}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-Atlas-local-2026!}
      ATLAS_RAW_STORE_PATH: /var/lib/atlas/raw
      ATLAS_CORS_ORIGINS: '["http://localhost:4173","http://localhost:5173"]'
      ATLAS_ALLOW_PRIVATE_NETWORKS: ${ATLAS_ALLOW_PRIVATE_NETWORKS:-false}
      ATLAS_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - raw-data:/var/lib/atlas/raw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  scheduler:
    build:
      context: ./backend
    command: ["python", "-m", "atlas.scheduler"]
    environment: *backend-environment
    volumes:
      - raw-data:/var/lib/atlas/raw
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "atlas.worker"]
    environment: *backend-environment
    volumes:
      - raw-data:/var/lib/atlas/raw
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${WEB_PORT:-4173}:80"
    depends_on:
      api:
        condition: service_healthy

  corpus:
    profiles: ["benchmark"]
    build:
      context: ./benchmark/corpus
    ports:
      - "8090:80"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/manifest.json')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  raw-data:
